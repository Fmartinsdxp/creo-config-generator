function gen(){
  const m=[],seen=new Set();
  for(const r of R){if(seen.has(r.n))continue;let ok=false;
    if(r.c.any){ok=true}else{ok=true;for(const[k,v]of Object.entries(r.c)){const pv=P[k];if(!pv){ok=false;break}
      if(Array.isArray(pv)){if(!pv.some(x=>v.includes(x))){ok=false;break}}else{if(!v.includes(pv)){ok=false;break}}}}
    if(ok&&r.v){seen.add(r.n);m.push(r)}}
  m.sort((a,b)=>a.cat.localeCompare(b.cat));
  const l=[],d=new Date().toISOString().split('T')[0];
  l.push('!===============================================================');
  l.push('! config.pro - Generated by Creo Config Generator v4.0');
  l.push('! Date: '+d);l.push('! Company: '+(P.company||'N/A'));l.push('! Location: '+(P.location||'N/A'));
  l.push('! Users: '+(P.users||'N/A')+(P.isGlobal==='yes'?' (Global: '+P.numLocations+' locations)':''));
  l.push('! Creo: '+P.version+'.0 | HW: RAM='+P.ram+' GPU='+P.gpu+' CPU='+P.cpu);
  l.push('! Infra: '+P.infra+' | Network: '+P.network+' | PLM: '+P.plm);
  l.push('! License: '+P.licType+(P.licType==='floating'?' (port '+P.licPort+')':''));
  l.push('! Assembly profile: '+P.asmSize+' | Drawing: '+P.drawComplexity);
  if(P.crashPrevent==='yes')l.push('! Crash prevention: ENABLED');
  if(P.multiRegionSync==='yes')l.push('! Multi-region sync: ENABLED');
  if(P.migrationFrom!=='none')l.push('! Migration from: '+P.migrationFrom.toUpperCase());
  l.push('!===============================================================');l.push('');
  // Dirs
  const dirs=[];
  if(P.workDir)dirs.push('working_directory '+P.workDir);
  if(P.searchPath)P.searchPath.split(';').forEach(p=>{if(p.trim())dirs.push('search_path '+p.trim())});
  if(P.templateDir){dirs.push('template_solidpart '+P.templateDir+'\\mmns_part_solid.prt');
    dirs.push('template_designasm '+P.templateDir+'\\mmns_asm_design.asm')}
  if(P.materialDir)dirs.push('pro_material_dir '+P.materialDir);
  if(P.formatDir)dirs.push('pro_format_dir '+P.formatDir);
  if(dirs.length){l.push('!--- Directories & Paths ---');dirs.forEach(x=>l.push(x));l.push('')}
  let cc='';for(const s of m){if(s.cat!==cc){cc=s.cat;l.push('!--- '+cc+' ---')}l.push(s.n+' '+s.v)}
  if(P.migrationFrom!=='none'&&P.migrationConfig){l.push('');l.push('!--- Migration Notes ('+P.migrationFrom.toUpperCase()+' -> Creo) ---');
    l.push('! Settings below were parsed from previous CAD config.');l.push('! Review carefully - not all options have direct equivalents.')}
  l.push('');l.push('! END OF CONFIG.PRO');
  return{content:l.join('\n'),settings:m}
}

function genEnv(){
  const l=[];
  l.push('REM ===============================================================');
  l.push('REM Windows Environment Variables for Creo '+P.version+'.0');
  l.push('REM Run this script as Administrator or set via System Properties');
  l.push('REM ===============================================================');l.push('');
  // License
  if(P.licType==='floating'){
    l.push('REM --- License Server Configuration ---');
    l.push('REM Replace LICENSE-SERVER-HOSTNAME with your actual FlexNet server');
    l.push('setx PTC_D_LICENSE_FILE "'+P.licPort+'@LICENSE-SERVER-HOSTNAME" /M');l.push('')}
  else if(P.licType==='nodelocked'){
    l.push('REM --- Node-Locked License ---');
    l.push('REM setx PTC_D_LICENSE_FILE "C:\\PTC\\license\\license.dat" /M');l.push('')}
  else if(P.licType==='cloud'){
    l.push('REM --- Creo+ Cloud License ---');
    l.push('REM No environment variable needed — configured via PTC account login');l.push('')}
  // Creo 9+ alt settings path
  if(parseInt(P.version)>=9){
    l.push('REM --- Creo '+P.version+': Shared Configuration Path (Creo 9+) ---');
    l.push('REM setx PTC_CREO_ALT_SETTINGS_PATH "\\\\server\\creo\\config" /M');l.push('')}
  // VDI
  if(P.infra==='vdi'){
    l.push('REM --- VDI Environment Fixes ---');
    l.push('setx PRO_MACHINE_TYPE "x86e_win64" /M');
    l.push('REM Required for virtual desktops (Citrix/VMware Horizon)');l.push('')}
  // Performance
  l.push('REM --- Performance Recommendations ---');
  if(P.asmSize==='large'||P.asmSize==='very_large'){
    l.push('REM For large assemblies: set CPU affinity for xtop.exe to single core');
    l.push('REM (Creo is mostly single-threaded for regen operations)');
    l.push('REM Use Task Manager > Details > xtop.exe > Set Affinity');l.push('')}
  l.push('REM --- Virtual Memory ---');
  const vmMin=P.ram==='128gb'?'32768':P.ram==='64gb'?'16384':P.ram==='32gb'?'8192':'4096';
  const vmMax=P.ram==='128gb'?'65536':P.ram==='64gb'?'32768':P.ram==='32gb'?'16384':'8192';
  l.push('REM Recommended pagefile: Initial='+vmMin+'MB / Maximum='+vmMax+'MB');
  l.push('REM Set via: System Properties > Advanced > Performance > Virtual Memory');l.push('');
  l.push('REM --- Graphics Driver ---');
  l.push('REM Ensure NVIDIA/AMD driver is PTC-certified for Creo '+P.version+'.0');
  l.push('REM Check: https://www.ptc.com/en/support/hardware-certification');l.push('');
  if(P.plm==='windchill'){
    l.push('REM --- Windchill Cache Location ---');
    l.push('REM setx PTC_WF_ROOT "D:\\CreoCache" /M');
    l.push('REM Move cache to faster drive (SSD) for better performance');l.push('')}
  l.push('REM --- Windows Power Settings ---');
  l.push('REM Set Power Plan to "High Performance" (especially laptops)');
  l.push('REM powercfg /setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c');l.push('');
  l.push('pause');
  return l.join('\n')
}

// ═══ ANALYZER: PARSE & ANALYZE ═══
function parseConfig(text){
  const settings = {};
  const lines = text.split('\n');
  lines.forEach((raw, i) => {
    const line = raw.trim();
    if(!line || line.startsWith('!') || line.startsWith('#') || line.startsWith('//')) return;
    const parts = line.split(/\s+/);
    if(parts.length < 1) return;
    const name = parts[0].toLowerCase();
    const value = parts.slice(1).join(' ').trim();
    // Skip invalid lines (malformed names)
    if(!/^[a-z_][a-z0-9_]*$/.test(name)) return;
    settings[name] = { value, lineNum: i+1, original: raw.trim() };
  });
  return settings;
}

function analyzeConfig(text){
  const current = parseConfig(text);
  const currentKeys = Object.keys(current);
  
  // Build list of all known setting names from rules
  const knownSettings = {};
  R.forEach(r => {
    if(!knownSettings[r.n]) knownSettings[r.n] = [];
    knownSettings[r.n].push(r);
  });

  // 1. OBSOLETE / DEPRECATED settings (known deprecated list)
  const deprecated = {
    'pro_mf_cl_dir': 'Renamed in newer Creo versions',
    'graphics': { check: v => v && v.toLowerCase() === 'win32_gdi', msg: 'win32_gdi is for low-end graphics only; use OPENGL for modern GPUs' },
    'smooth_lines': { check: v => v && v.toLowerCase() === 'yes', msg: 'PTC community: can cause performance issues, recommend "no"' },
    'enable_fsaa': { check: v => v && v.toLowerCase() === 'yes', msg: 'Anti-aliasing ON can hurt large assembly performance; consider turning OFF' },
    'shade_quality': { check: v => v && parseInt(v) > 3, msg: 'Values above 3 are "EXTREMELY DETRIMENTAL" for large assemblies per PTC community' },
  };

  // Typos detection - common misspellings
  const typos = {
    'llow_freeze_failed_assy_comp': 'allow_freeze_failed_assy_comp',
    'regen_int_mdls_on_ret': 'regen_int_mdls_on_retr',
    'display_silhoutte_edges': 'display_silhouette_edges',
  };

  const report = {
    totalSettings: currentKeys.length,
    matchedRecommended: [],
    missingRecommended: [],
    suboptimal: [],
    obsolete: [],
    typos: [],
    unknown: [],
    categories: {},
    rawCurrent: current
  };

  // Check each current setting
  currentKeys.forEach(key => {
    const s = current[key];
    
    // Check for typos
    if(typos[key]){
      report.typos.push({
        name: key,
        value: s.value,
        suggestion: typos[key],
        lineNum: s.lineNum
      });
      return;
    }

    // Check deprecated/obsolete
    if(deprecated[key]){
      const dep = deprecated[key];
      if(typeof dep === 'string'){
        report.obsolete.push({name: key, value: s.value, reason: dep, lineNum: s.lineNum});
      } else if(dep.check && dep.check(s.value)){
        report.obsolete.push({name: key, value: s.value, reason: dep.msg, lineNum: s.lineNum});
      }
    }

    // Check against known recommendations
    if(knownSettings[key]){
      const rules = knownSettings[key];
      // Find if current value matches any recommended value
      const matches = rules.filter(r => r.v.toLowerCase() === s.value.toLowerCase());
      if(matches.length > 0){
        report.matchedRecommended.push({name: key, value: s.value, rule: matches[0]});
      } else {
        // Value differs from recommendations
        const recommendedValues = [...new Set(rules.map(r => r.v))];
        report.suboptimal.push({
          name: key,
          currentValue: s.value,
          recommendedValues: recommendedValues,
          category: rules[0].cat,
          description: rules[0].d,
          lineNum: s.lineNum
        });
      }
      // Track category
      report.categories[rules[0].cat] = (report.categories[rules[0].cat]||0) + 1;
    } else {
      report.unknown.push({name: key, value: s.value, lineNum: s.lineNum});
    }
  });

  // Find missing recommended settings (high-priority only: those with any:true or common conditions)
  const currentSet = new Set(currentKeys);
  const importantMissing = new Set();
  R.forEach(r => {
    if(currentSet.has(r.n)) return;
    // Only flag universal recommendations and critical ones
    if(r.c.any || r.cat === 'Crash Prevention' || r.cat === 'Environment' || r.cat === 'Mass Properties'){
      if(!importantMissing.has(r.n)){
        importantMissing.add(r.n);
        report.missingRecommended.push({
          name: r.n,
          recommendedValue: r.v,
          category: r.cat,
          description: r.d
        });
      }
    }
  });

  // Calculate health score (0-100)
  const total = report.totalSettings || 1;
  const issues = report.obsolete.length + report.suboptimal.length + report.typos.length;
  const matches = report.matchedRecommended.length;
  const missingPenalty = Math.min(report.missingRecommended.length * 0.5, 20);
  const issuesPenalty = issues * 2;
  const matchBonus = matches * 1.5;
  report.healthScore = Math.max(0, Math.min(100, Math.round(70 - issuesPenalty - missingPenalty + matchBonus)));

  return report;
}

function downloadReport(){
  const r = analyzerResult;
  const lines = [];
  lines.push('='.repeat(70));
  lines.push('CREO CONFIG.PRO ANALYSIS REPORT');
  lines.push('Generated: ' + new Date().toISOString().split('T')[0]);
  lines.push('='.repeat(70));
  lines.push('');
  lines.push('SUMMARY');
  lines.push('-'.repeat(70));
  lines.push('Health Score: ' + r.healthScore + '/100');
  lines.push('Total settings analyzed: ' + r.totalSettings);
  lines.push('Matching PTC recommendations: ' + r.matchedRecommended.length);
  lines.push('Suboptimal values: ' + r.suboptimal.length);
  lines.push('Obsolete/problematic: ' + r.obsolete.length);
  lines.push('Typos detected: ' + r.typos.length);
  lines.push('Recommended settings missing: ' + r.missingRecommended.length);
  lines.push('Unknown/custom settings: ' + r.unknown.length);
  lines.push('');

  if(r.typos.length){
    lines.push('CRITICAL: TYPOS (lines are being ignored by Creo)');
    lines.push('-'.repeat(70));
    r.typos.forEach(t => {
      lines.push('  Line ' + t.lineNum + ': ' + t.name + ' -> should be: ' + t.suggestion);
      lines.push('    Current value: ' + t.value);
    });
    lines.push('');
  }

  if(r.obsolete.length){
    lines.push('OBSOLETE / PROBLEMATIC SETTINGS');
    lines.push('-'.repeat(70));
    r.obsolete.forEach(o => {
      lines.push('  Line ' + o.lineNum + ': ' + o.name + ' = ' + o.value);
      lines.push('    Issue: ' + o.reason);
    });
    lines.push('');
  }

  if(r.suboptimal.length){
    lines.push('SUBOPTIMAL VALUES');
    lines.push('-'.repeat(70));
    r.suboptimal.forEach(s => {
      lines.push('  Line ' + s.lineNum + ': ' + s.name);
      lines.push('    Current: ' + s.currentValue);
      lines.push('    Recommended: ' + s.recommendedValues.join(' or '));
      lines.push('    Category: ' + s.category + ' | ' + s.description);
    });
    lines.push('');
  }

  if(r.missingRecommended.length){
    lines.push('RECOMMENDED SETTINGS MISSING');
    lines.push('-'.repeat(70));
    r.missingRecommended.forEach(m => {
      lines.push('  + ' + m.name + ' ' + m.recommendedValue);
      lines.push('    ' + m.category + ' | ' + m.description);
    });
    lines.push('');
  }

  if(r.matchedRecommended.length){
    lines.push('SETTINGS ALREADY OPTIMAL');
    lines.push('-'.repeat(70));
    r.matchedRecommended.forEach(m => {
      lines.push('  OK  ' + m.name + ' = ' + m.value);
    });
    lines.push('');
  }

  lines.push('='.repeat(70));
  lines.push('END OF REPORT');

  const blob = new Blob([lines.join('\n')], {type:'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'config_pro_analysis_report.txt';
  a.click();
  URL.revokeObjectURL(url);
}

function sRes(el){
  const{content,settings}=gen();window._cc=content;window._ev=genEnv();
  const cc2={};settings.forEach(s=>{cc2[s.cat]=(cc2[s.cat]||0)+1});
  el.innerHTML='<div class="sg">'
  +`<div class="sb2" style="background:var(--acd)"><div class="nm" style="color:var(--ac)">${settings.length}</div><div class="la">Settings</div></div>`
  +`<div class="sb2" style="background:var(--okd)"><div class="nm" style="color:var(--ok)">${Object.keys(cc2).length}</div><div class="la">Categories</div></div>`
  +`<div class="sb2" style="background:var(--wnd)"><div class="nm" style="color:var(--wn)">v${P.version}</div><div class="la">Creo</div></div></div>`

  // Tabs
  +'<div class="tabs"><div class="tab '+(resTab==='config'?'active':'')+'" onclick="resTab=\'config\';render()">📄 config.pro</div>'
  +'<div class="tab '+(resTab==='env'?'active':'')+'" onclick="resTab=\'env\';render()">🖥️ Windows Env Variables</div>'
  +'<div class="tab '+(resTab==='notes'?'active':'')+'" onclick="resTab=\'notes\';render()">📋 Deployment Notes</div></div>'

  +(resTab==='config'?
    '<div style="display:flex;gap:8px;margin-bottom:14px"><button class="btn bd" onclick="dl(\'config\')">⬇ Download config.pro</button>'
    +'<button class="btn bc" id="cpb" onclick="cp(\'config\')">📋 Copy</button></div>'
    +'<div class="sec">Settings by Category</div><div class="tw">'
    +Object.entries(cc2).sort((a,b)=>b[1]-a[1]).map(([c,n])=>`<span class="tg">${c} (${n})</span>`).join('')+'</div>'
    +'<div class="cp2">'+content.split('\n').map((l,i)=>{let h='';
      if(l.startsWith('!')){h=`<span style="color:#4a5568">${esc(l)}</span>`}
      else if(l.includes(' ')&&l.trim()){const p=l.split(' ');h=`<span style="color:#7eb8f7">${esc(p[0])}</span> <span style="color:#a5d6ff">${esc(p.slice(1).join(' '))}</span>`}
      else h=esc(l);return`<div class="cl"><span class="ln">${i+1}</span>${h}</div>`}).join('')+'</div>'
  :resTab==='env'?
    '<div style="display:flex;gap:8px;margin-bottom:14px"><button class="btn bd" onclick="dl(\'env\')">⬇ Download .bat</button>'
    +'<button class="btn bc" id="cpb" onclick="cp(\'env\')">📋 Copy</button></div>'
    +'<div class="sec">Windows Environment Variables & System Settings</div>'
    +'<div class="cp2">'+window._ev.split('\n').map((l,i)=>{let h='';
      if(l.startsWith('REM'))h=`<span style="color:#4a5568">${esc(l)}</span>`;
      else if(l.startsWith('setx'))h=`<span style="color:#00d68f">${esc(l)}</span>`;
      else h=`<span style="color:#a5d6ff">${esc(l)}</span>`;
      return`<div class="cl"><span class="ln">${i+1}</span>${h}</div>`}).join('')+'</div>'
  :// Deployment Notes
    '<div class="sec">Deployment Checklist</div><div style="font-size:12px;line-height:2;color:var(--tx)">'
    +'<b>1.</b> Place <code>config.pro</code> in the Creo start-in directory<br>'
    +'<b>2.</b> Run the environment variables .bat file as Administrator<br>'
    +'<b>3.</b> Verify GPU driver is PTC-certified for Creo '+P.version+'.0<br>'
    +(P.plm==='windchill'?'<b>4.</b> Register Windchill server in Creo after first launch<br>':'')
    +(parseInt(P.version)>=9?'<b>'+(P.plm==='windchill'?'5':'4')+'.</b> For shared configs, set <code>PTC_CREO_ALT_SETTINGS_PATH</code> env variable (Creo 9+)<br>':'')
    +(P.isGlobal==='yes'?'<b>⚠️</b> Multi-site: Generate separate config.pro per location if hardware differs<br>':'')
    +(P.infra==='vdi'?'<b>⚠️</b> VDI: Verify <code>PRO_MACHINE_TYPE=x86e_win64</code> and <code>enable_opengl_fbo no</code><br>':'')
    +'</div>'
    +'<div class="sec">Config.pro Load Order (PTC Documentation)</div><div style="font-size:11px;line-height:1.8;color:var(--txd)">'
    +'1. <code>&lt;Creo_install&gt;\\text\\config.pro</code> — Installation defaults<br>'
    +'2. <code>%USERPROFILE%\\config.pro</code> — User home directory<br>'
    +'3. <code>&lt;Start-In directory&gt;\\config.pro</code> — Shortcut start-in folder<br>'
    +'4. <code>config.sup</code> — Admin-locked settings (cannot be overridden)<br>'
    +'<br>Later files override earlier ones. <code>config.sup</code> always wins.</div>'
  )

  +'<div class="wb">⚠️ Review all settings against your specific environment. Validate with PTC documentation for Creo '+P.version+'.0. For global deployments, test at one site before rolling out.</div>'
}

// ═══ ACTIONS ═══
function sv(k,v){P[k]=v;render()}
function tu(v){const i=P.usage.indexOf(v);if(i>=0)P.usage.splice(i,1);else P.usage.push(v);render()}
function next(){if(step<ST.length-1){step++;render();scrollTo(0,0)}}
function prev(){if(step>0){step--;render();scrollTo(0,0)}}
function go(i){step=i;render();scrollTo(0,0)}
function dl(type){
  const c=type==='env'?window._ev:window._cc;
  const fn=type==='env'?'creo_env_setup.bat':'config.pro';
  const b=new Blob([c],{type:'text/plain'});const u=URL.createObjectURL(b);
  const a=document.createElement('a');a.href=u;a.download=fn;a.click();URL.revokeObjectURL(u)}
function cp(type){
  const t=type==='env'?window._ev:window._cc;
  navigator.clipboard.writeText(t).then(cpOk).catch(()=>{const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);cpOk()})}
function cpOk(){const b=document.getElementById('cpb');b.className='btn bc cp';b.textContent='✓ Copied!';setTimeout(()=>{b.className='btn bc';b.textContent='📋 Copy'},2000)}

render();
</script>
